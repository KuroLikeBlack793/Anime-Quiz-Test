<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime Quiz by Dabi</title>
    <style>
        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
        }
        
        body { 
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; 
            background-color: #0a0f24;
            color: #ffffff; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            padding: 20px;
            text-transform: uppercase;
        }
        
        .quiz-container { 
            background-color: #11183b;
            padding: 40px; 
            border-radius: 0;
            max-width: 600px; 
            width: 100%; 
            border: 3px solid #00e5ff;
            position: relative;
        }
        
        .quiz-header {
            margin-bottom: 30px;
        }
        
        .progress-text {
            font-size: 14px;
            color: #00e5ff;
            margin-bottom: 12px;
            display: block;
            font-weight: 700;
            letter-spacing: 2px;
        }

        .progress-bar {
            height: 10px;
            background-color: #0a0f24;
            border: 2px solid #00e5ff;
            border-radius: 0;
            width: 100%;
            overflow: hidden;
            margin-bottom: 20px;
        }

        .progress-fill {
            height: 100%;
            background: #ffea00;
            width: 0%;
            transition: width 0.4s ease;
        }
        
        h2 { 
            font-size: 24px;
            font-weight: 800;
            line-height: 1.5;
            color: #ffffff;
            letter-spacing: 1px;
        }
        
        .answers-grid {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 25px;
        }
        
        .btn { 
            display: block; 
            width: 100%; 
            background-color: #0a0f24; 
            color: #ffffff; 
            border: 2px solid #ffffff;
            padding: 16px 20px; 
            border-radius: 0; 
            font-size: 16px; 
            font-weight: 700;
            cursor: pointer; 
            text-align: left;
            text-transform: uppercase;
            transition: background-color 0.2s ease, border-color 0.2s ease, color 0.2s ease; 
        }
        
        .btn:hover:not(:disabled) { 
            background-color: #ffea00; 
            border-color: #ffea00;
            color: #0a0f24;
        }

        .btn:active:not(:disabled) {
            background-color: #ccbc00;
            border-color: #ccbc00;
        }

        .btn.correct {
            background-color: #00ff66 !important;
            border-color: #00ff66 !important;
            color: #0a0f24 !important;
        }

        .btn.wrong {
            background-color: #ff0055 !important;
            border-color: #ff0055 !important;
            color: #ffffff !important;
        }

        .btn:disabled {
            cursor: not-allowed;
        }

        .action-btn {
            background: #00e5ff;
            color: #0a0f24;
            border: 2px solid #00e5ff;
            padding: 16px 30px;
            border-radius: 0;
            font-size: 18px;
            font-weight: 800;
            cursor: pointer;
            text-transform: uppercase;
            width: 100%;
            transition: background-color 0.2s ease, border-color 0.2s ease, color 0.2s ease;
        }

        .action-btn:hover {
            background-color: #ffea00;
            border-color: #ffea00;
            color: #0a0f24;
        }

        .action-btn:active {
            background-color: #ccbc00;
            border-color: #ccbc00;
        }

        #next-btn {
            display: none; 
            margin-top: 10px;
        }

        .result-view {
            text-align: center;
            display: none;
        }

        .score-box {
            font-size: 64px;
            font-weight: 900;
            color: #ffea00;
            margin: 30px 0;
            letter-spacing: 2px;
        }

        .feedback-text {
            font-size: 20px;
            color: #ffffff;
            margin-bottom: 40px;
            font-weight: 700;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

<div class="quiz-container">
    <div id="quiz-view">
        <div class="quiz-header">
            <span class="progress-text" id="progress-text">Domanda 1 di 10</span>
            <div class="progress-bar">
                <div class="progress-fill" id="progress-fill"></div>
            </div>
            <h2 id="question">Caricamento della domanda...</h2>
        </div>
        <div class="answers-grid" id="answers"></div>
        
        <button id="next-btn" class="action-btn" onclick="nextQuestion()">Prossima Domanda &rarr;</button>
    </div>

    <div class="result-view" id="result-view">
        <h2>Quiz Completato!</h2>
        <div class="score-box" id="score-text">0 / 0</div>
        <p class="feedback-text" id="feedback"></p>
        <button class="action-btn" onclick="restartQuiz()">Riprova il Quiz</button>
    </div>
</div>

<script>
    const quizData = [
        { 
            q: "Nel famoso otome francese Amour Sucré chi si diploma al liceo con il massimo dei voti insieme a Nathaniel?", 
            a: ["Kentin", "Armin", "Castiel", "Lysandre"], 
            correct: 2 
        },
        { 
            q: "Nell'anime Angel Sanctuary di chi è la reincarnazione Setsuna Mudo?", 
            a: ["Sevoftarta", "Djibril (Arcangelo Gabriele)", "Lucifer", "Alexiel"], 
            correct: 3 
        },
        {
            q: "Nel famoso otome fantasy Eldarya quale era la vera identità di Ashkore?",
            a: ["Ezarel", "Lance", "Valkyon", "Leiftan"],
            correct: 1 
        },
        {
            q: "In Bungo Stray Dogs chi era il 5 e ultimo membro della Decomposizione dell'Angelo, conosciuto come Kamui?",
            a: ["Mushitaro Oguri", "Tachihara Michizou", "Bram Stoker", "Ochi Fukuchi"],
            correct: 3 
        },
        {
            q: "In Final Fantasy VIII qual è il continente con il territorio più vasto?",
            a: ["Trabia", "Galbadia", "Esthar", "Centra"],
            correct: 2 
        },
        {
            q: "Alla fine di Gintama a quanto ammontano le vittorie di Gintoki contro Takasugi?",
            a: ["247", "427", "127", "347"],
            correct: 0 
        },
        {
            q: "Nell'anime X/1999 quale tra questi personaggi NON è uno sei sette sigilli?",
            a: ["Sorata Arisugawa", "Karen Kasumi", "Subaru Sumeragi", "Kusanagi Shiyu"],
            correct: 3 
        },
        {
            q: "Nell'anime Tasokare Hotel quale tra questi personaggi alla fine della storia NON sopravvive?",
            a: ["Neko Tsukahara", "Ruri", "Masaki Osoto", "Haruto Atori"],
            correct: 2 
        },
        {
            q: "Nell'anime Durarara!! quale era il nickname usato da Izaya Orihara nella chat della gang Dollars?",
            a: ["Setton", "Taro Tanaka", "Kanra", "Bakyura"],
            correct: 2 
        },
        {
            q: "Qual è il vero nome del Samurai Himura Kenshin?",
            a: ["Shinta", "Enishi", "Yahiko", "Kenji"],
            correct: 0 
        }
    ];

    let currentQuestion = 0;
    let score = 0;

    const quizView = document.getElementById("quiz-view");
    const resultView = document.getElementById("result-view");
    const questionEl = document.getElementById("question");
    const answersContainer = document.getElementById("answers");
    const progressText = document.getElementById("progress-text");
    const progressFill = document.getElementById("progress-fill");
    const scoreText = document.getElementById("score-text");
    const feedbackEl = document.getElementById("feedback");
    const nextBtn = document.getElementById("next-btn");

    function loadQuiz() {
        if (currentQuestion < quizData.length) {
            quizView.style.display = "block";
            resultView.style.display = "none";
            nextBtn.style.display = "none";

            const current = quizData[currentQuestion];

            progressText.innerText = `Domanda ${currentQuestion + 1} di ${quizData.length}`;
            const progressPercent = (currentQuestion / quizData.length) * 100;
            progressFill.style.width = `${progressPercent}%`;

            questionEl.innerText = current.q;

            answersContainer.innerHTML = "";
            current.a.forEach((ans, index) => {
                const button = document.createElement("button");
                button.innerText = ans;
                button.classList.add("btn");

                button.onclick = () => checkAnswer(index, button);
                answersContainer.appendChild(button);
            });
        } else {
            showResults();
        }
    }

    function checkAnswer(selectedIndex, clickedButton) {
        const correctIndex = quizData[currentQuestion].correct;
        const allButtons = answersContainer.querySelectorAll('.btn');

        allButtons.forEach(btn => {
            btn.disabled = true;
        });

        if (selectedIndex === correctIndex) {
            clickedButton.classList.add('correct');
            score++;
        } else {
            clickedButton.classList.add('wrong');

            allButtons[correctIndex].classList.add('correct');
        }

        nextBtn.style.display = "block";
    }

    function nextQuestion() {
        currentQuestion++;
        loadQuiz();
    }

    function showResults() {
        quizView.style.display = "none";
        resultView.style.display = "block";
        progressFill.style.width = "100%";
        
        scoreText.innerText = `${score} / ${quizData.length}`;
        
        const percentuale = (score / quizData.length) * 100;
        if (percentuale === 100) {
            feedbackEl.innerText = "S RANK! Hai risposto correttamente a tutte le domande, sei proprio un grande! 🏆";
        } else if (percentuale >= 90) {
            feedbackEl.innerText = "A RANK! Hai superato il quiz, complimenti! ✨";
        }  else if (percentuale >= 80) {
            feedbackEl.innerText = "B RANK! Hai superato il quiz, complimenti! ✨";
        }  else if (percentuale >= 70) {
            feedbackEl.innerText = "C RANK! Hai superato il quiz, complimenti! ✨";
        }  else if (percentuale >= 60) {
            feedbackEl.innerText = "D RANK! Hai superato il quiz, complimenti! ✨";
        } else {
            feedbackEl.innerText = "Riprova fai schifo. 🎮";
        }
    }

    function restartQuiz() {
        currentQuestion = 0;
        score = 0;
        loadQuiz();
    }

    loadQuiz();
</script>

</body>
</html>
